<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} — ClickUp Wiki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="{{basePath}}assets/css/document.css">
</head>

<body>
  <div class="doc-header-strip"></div>
  <button type="button" class="doc-sticky-toggle" aria-pressed="true" title="Toggle sticky headers"
    aria-label="Toggle sticky headers on or off">Sticky headers</button>
  <div class="doc-layout">
    <nav class="doc-toc" aria-label="Table of contents">
      <div class="doc-toc-inner">
        {{toc}}
      </div>
    </nav>
    <main class="document doc-content">
      {{content}}
    </main>
  </div>
  <footer class="doc-footer">{{footer}}</footer>
  <script>
    (function () {
      var toc = document.querySelector('.doc-toc');
      var content = document.querySelector('.doc-content');
      if (!toc || !content) return;
      var links = toc.querySelectorAll('a[href^="#"]');
      var headings = [];
      links.forEach(function (a) {
        var id = a.getAttribute('href').slice(1);
        var el = document.getElementById(id);
        if (el) headings.push({ id: id, el: el, a: a });
      });
      function updateActive() {
        var top = window.scrollY || document.documentElement.scrollTop;
        var active = null;
        for (var i = headings.length - 1; i >= 0; i--) {
          if (headings[i].el.getBoundingClientRect().top <= 100) {
            active = headings[i];
            break;
          }
        }
        if (!active && headings.length) active = headings[0];
        links.forEach(function (a) { a.classList.remove('is-active'); });
        if (active) active.a.classList.add('is-active');
      }
      window.addEventListener('scroll', updateActive, { passive: true });
      window.addEventListener('resize', updateActive);
      updateActive();
    })();
  </script>
  <script>
    (function () {
      var content = document.querySelector('.doc-content');
      if (!content) return;
      var headings = Array.prototype.slice.call(content.querySelectorAll('h1, h2, h3, h4, h5, h6'));
      var docTops = [];
      var STORAGE_KEY = 'clickup-wiki-sticky-headers';

      function level(el) {
        return parseInt(el.tagName.charAt(1), 10);
      }

      // Use offsetTop traversal — unaffected by position:sticky, unlike getBoundingClientRect
      function docOffsetTop(el) {
        var top = 0;
        var node = el;
        while (node) { top += node.offsetTop; node = node.offsetParent; }
        return top;
      }

      function cachePositions() {
        docTops = headings.map(docOffsetTop);
      }

      function updateStickyActive() {
        var btn = document.querySelector('.doc-sticky-toggle');
        if (btn && btn.getAttribute('aria-pressed') !== 'true') {
          headings.forEach(function (el) { el.classList.remove('sticky-active'); });
          updateTableStickyTop();
          return;
        }

        // Measure the height of the currently-stuck headers (from previous frame)
        // so that a new heading becomes "current" the moment it slides behind them.
        var stickyHeight = 0;
        headings.forEach(function (el) {
          if (el.classList.contains('sticky-active')) stickyHeight += el.offsetHeight;
        });

        var scrollTop = window.scrollY + stickyHeight;
        var currentIdx = 0;
        for (var i = headings.length - 1; i >= 0; i--) {
          if (docTops[i] <= scrollTop) { currentIdx = i; break; }
        }

        var currentLevel = level(headings[currentIdx]);
        var chain = [];
        for (var lvl = 1; lvl <= currentLevel; lvl++) {
          for (var j = currentIdx; j >= 0; j--) {
            if (level(headings[j]) === lvl) { chain.push(headings[j]); break; }
          }
        }

        headings.forEach(function (el) {
          el.classList.toggle('sticky-active', chain.indexOf(el) !== -1);
        });

        updateTableStickyTop();
      }

      function updateTableStickyTop() {
        var btn = document.querySelector('.doc-sticky-toggle');
        var isEnabled = btn && btn.getAttribute('aria-pressed') === 'true';
        var top = 0;
        if (isEnabled) {
          headings.forEach(function (el) {
            if (el.classList.contains('sticky-active')) {
              var b = el.getBoundingClientRect().bottom;
              if (b > top) top = b;
            }
          });
        }
        document.documentElement.style.setProperty('--table-sticky-top', top + 'px');
      }

      function setStickyEnabled(on) {
        var btn = document.querySelector('.doc-sticky-toggle');
        if (!btn) return;
        btn.setAttribute('aria-pressed', on ? 'true' : 'false');
        try { localStorage.setItem(STORAGE_KEY, on ? 'on' : 'off'); } catch (e) { }
        updateStickyActive();
      }

      cachePositions();
      window.addEventListener('scroll', updateStickyActive, { passive: true });
      window.addEventListener('resize', function () { cachePositions(); updateStickyActive(); });

      var btn = document.querySelector('.doc-sticky-toggle');
      if (btn) {
        try {
          var saved = localStorage.getItem(STORAGE_KEY);
          if (saved === 'off') setStickyEnabled(false);
        } catch (e) { }
        btn.addEventListener('click', function () {
          setStickyEnabled(btn.getAttribute('aria-pressed') !== 'true');
        });
      }
      updateStickyActive();
    })();
  </script>
  <script>
    (function () {
      function getScrollOffset(table) {
        var stickyTop = parseFloat(
          getComputedStyle(document.documentElement).getPropertyValue('--table-sticky-top')
        ) || 0;
        var thead = table ? table.querySelector('thead') : null;
        var theadH = thead ? thead.offsetHeight : 0;
        return stickyTop + theadH + 8;
      }

      function scrollToRow(el) {
        var table = el.closest('table');
        var offset = getScrollOffset(table);
        var top = el.getBoundingClientRect().top + window.scrollY - offset;
        window.scrollTo({ top: Math.max(0, top), behavior: 'instant' });
      }

      function highlightRow(el) {
        el.classList.remove('row-highlight');
        void el.offsetHeight;
        el.classList.add('row-highlight');
        if (window._rowHighlightTimeout) clearTimeout(window._rowHighlightTimeout);
        window._rowHighlightTimeout = setTimeout(function () {
          el.classList.remove('row-highlight');
        }, 2100);
      }

      function handleHash(hash) {
        if (!hash || hash.indexOf('row-') !== 0) return;
        var el = document.getElementById(hash);
        if (!el || el.tagName !== 'TR') return;
        scrollToRow(el);
        highlightRow(el);
      }

      window.addEventListener('load', function () {
        handleHash(window.location.hash.slice(1));
      });

      window.addEventListener('hashchange', function () {
        handleHash(window.location.hash.slice(1));
      });

      document.addEventListener('click', function (e) {
        var a = e.target.closest('a[href^="#row-"]');
        if (!a) return;
        var href = a.getAttribute('href');
        var hash = href.slice(1);
        var el = document.getElementById(hash);
        if (!el || el.tagName !== 'TR') return;
        e.preventDefault();
        history.pushState(null, '', href);
        scrollToRow(el);
        highlightRow(el);
      });
    })();
  </script>
  <script>
    (function () {
      var tooltip = document.createElement('div');
      tooltip.className = 'row-preview-tooltip';
      document.body.appendChild(tooltip);

      function buildTooltip(row) {
        var table = row.closest('table');
        if (!table) return false;
        var headerCells = table.querySelectorAll('thead th');
        var dataCells = row.querySelectorAll('td');
        if (!headerCells.length || !dataCells.length) return false;

        var headHtml = '<tr>';
        headerCells.forEach(function (th) { headHtml += '<th>' + th.innerHTML + '</th>'; });
        headHtml += '</tr>';

        var rowHtml = '<tr>';
        dataCells.forEach(function (td) { rowHtml += '<td>' + td.innerHTML + '</td>'; });
        rowHtml += '</tr>';

        tooltip.innerHTML = '<table><thead>' + headHtml + '</thead><tbody>' + rowHtml + '</tbody></table>';
        return true;
      }

      function positionTooltip(link) {
        var rect = link.getBoundingClientRect();
        var margin = 10;
        var tw = tooltip.offsetWidth;
        var th = tooltip.offsetHeight;

        var top = rect.bottom + margin;
        if (top + th > window.innerHeight - margin) {
          top = rect.top - th - margin;
        }

        var left = rect.left;
        if (left + tw > window.innerWidth - margin) {
          left = window.innerWidth - tw - margin;
        }
        if (left < margin) left = margin;

        tooltip.style.top = top + 'px';
        tooltip.style.left = left + 'px';
      }

      function showTooltip(link) {
        var hash = link.getAttribute('href').slice(1);
        var row = document.getElementById(hash);
        if (!row || row.tagName !== 'TR') return;
        if (!buildTooltip(row)) return;
        tooltip.classList.add('is-visible');
        positionTooltip(link);
      }

      function hideTooltip() {
        tooltip.classList.remove('is-visible');
      }

      document.addEventListener('mouseover', function (e) {
        var a = e.target.closest('a[href^="#row-"]');
        if (a) showTooltip(a);
      });

      document.addEventListener('mouseout', function (e) {
        var a = e.target.closest('a[href^="#row-"]');
        if (a && !a.contains(e.relatedTarget)) hideTooltip();
      });
    })();
  </script>
</body>

</html>
